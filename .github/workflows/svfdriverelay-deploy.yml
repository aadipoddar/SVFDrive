name: Deploy Relay to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  version-check:
    uses: ./.github/workflows/version-checks.yml

  build:
    runs-on: ubuntu-latest
    needs: version-check
    if: needs.version-check.outputs.should-deploy == 'true'
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore SVFDriveRelay
        run: dotnet restore SVFDriveRelay/SVFDriveRelay.csproj

      - name: Build SVFDriveRelay
        run: dotnet build SVFDriveRelay/SVFDriveRelay.csproj --configuration Release --no-restore

      - name: Publish SVFDriveRelay
        run: dotnet publish SVFDriveRelay/SVFDriveRelay.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: [version-check, build]
    if: needs.version-check.outputs.should-deploy == 'true'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'svfdriverelay'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EB7D7356164242E99BC365CD009B0BB5 }}

      - name: Deployment Summary
        run: |
          echo "🚀 Successfully deployed SVFDriveRelay version ${{ needs.version-check.outputs.current-version }} to Azure"
