name: Build All Projects

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui --skip-sign-check
    
    - name: Restore dependencies
      run: dotnet restore SVFDrive.slnx

    - name: Build SVFDriveLibrary
      run: dotnet build SVFDriveLibrary/SVFDriveLibrary.csproj --no-restore --configuration Release
    
    - name: Build SVFDrive.Shared
      run: dotnet build SVFDrive/SVFDrive.Shared/SVFDrive.Shared.csproj --no-restore --configuration Release
    
    - name: Build SVFDrive.Web
      run: dotnet build SVFDrive/SVFDrive.Web/SVFDrive.Web.csproj --no-restore --configuration Release
    
    - name: Build SVFDrive MAUI (Android)
      run: dotnet build SVFDrive/SVFDrive/SVFDrive.csproj --configuration Release --framework net10.0-android
    
    - name: Build SVFDrive MAUI (Windows)
      run: dotnet build SVFDrive/SVFDrive/SVFDrive.csproj --configuration Release --framework net10.0-windows10.0.19041.0
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build SQL Server Database Project
      run: msbuild DBSVFDrive/DBSVFDrive.sqlproj /p:Configuration=Release /p:Platform="Any CPU"
