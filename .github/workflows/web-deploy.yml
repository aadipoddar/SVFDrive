name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  version-check:
    uses: ./.github/workflows/version-checks.yml

  build:
    runs-on: ubuntu-latest
    needs: version-check
    if: needs.version-check.outputs.should-deploy == 'true'
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore SVFDriveLibrary
        run: dotnet restore SVFDriveLibrary/SVFDriveLibrary.csproj

      - name: Restore SVFDrive.Shared
        run: dotnet restore SVFDrive/SVFDrive.Shared/SVFDrive.Shared.csproj

      - name: Restore SVFDrive.Web
        run: dotnet restore SVFDrive/SVFDrive.Web/SVFDrive.Web.csproj

      - name: Create Secrets.local_secrets.cs
        run: |
          $secretsContent = @"
          namespace SVFDriveLibrary.DataAccess;

          public static partial class Secrets
          {
              static Secrets()
              {
                  AzureConnectionString = "${{ secrets.AzureConnectionString }}";

                  SyncfusionLicense = "${{ secrets.SyncfusionLicense }}";

                  EmailPassword = "${{ secrets.EmailPassword }}";
                  ToEmail = "${{ secrets.ToEmail }}";

                  RelayUrl = "${{ secrets.RelayUrl }}";
              }
          }
          "@
          Set-Content -Path "SVFDriveLibrary/DataAccess/Secrets.local_secrets.cs" -Value $secretsContent
        shell: pwsh

      - name: Build SVFDriveLibrary
        run: dotnet build SVFDriveLibrary/SVFDriveLibrary.csproj --configuration Release --no-restore

      - name: Build SVFDrive.Shared
        run: dotnet build SVFDrive/SVFDrive.Shared/SVFDrive.Shared.csproj --configuration Release --no-restore

      - name: Build SVFDrive.Web
        run: dotnet build SVFDrive/SVFDrive.Web/SVFDrive.Web.csproj --configuration Release --no-restore

      - name: Publish SVFDrive.Web
        run: dotnet publish SVFDrive/SVFDrive.Web/SVFDrive.Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: [version-check, build]
    if: needs.version-check.outputs.should-deploy == 'true'
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'svfdrive'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C2497737DC6643A49C35D6549682F3E4 }}
      
      - name: Deployment Summary
        run: |
          echo "🚀 Successfully deployed SVFDrive version ${{ needs.version-check.outputs.current-version }} to Azure"
